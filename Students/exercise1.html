<!DOCTYPE html> 
 
<html> 
    <head> 
        <title>Lab4 - Exercise 1</title> 
    </head> 
 
<body> 
    <input type="text" id="textInput" placeholder="Type something here..."/> 
        <label id="textLabel"></label> 
            <button id="redButton" style="color:red;">Red</button> 
            <button id="blueButton" style="color:blue;">Blue</button> 
            <button id="greenButton" style="color:green;">Green</button> 
            <button id="orangeButton" style="color:orange;">Orange</button> 
            <button id="purpleButton" style="color:purple;">Purple</button> 
</body> 
 
<script type="text/javascript"> 
    var textbox = document.getElementById("textInput");
    textbox.addEventListener('keydown', (event) => {
        if (event.key == "Enter") {
            console.log('Testing: value detected: ' + event.key);
            var textLabel = document.getElementById("textLabel");
            textLabel.textContent =  textbox.value;
            textbox.value = "";
        }
    });

    var redBtn = document.getElementById("redButton");
    var blueBtn = document.getElementById("blueButton");
    var greenBtn = document.getElementById("greenButton");
    var orangeBtn = document.getElementById("orangeButton");
    var purpleBtn = document.getElementById("purpleButton");
       
    function changeColor(newColor){
        var textLabel = document.getElementById("textLabel");
        textLabel.style.color = newColor;
    }

    redBtn.addEventListener('click', function(){changeColor("red")});
    blueBtn.addEventListener('click', function(){changeColor("blue")});
    greenBtn.addEventListener('click', function(){changeColor("green")});
    orangeBtn.addEventListener('click', function(){changeColor("orange")});
    purpleBtn.addEventListener('click', function(){changeColor("purple")});
 
</script> 
 
</html>
